    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .equipo {
            width: 200px;
            height: 180px;
            background: #1a1a1a;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .equipo img {
            transition: transform 0.3s;
        }

        .equipo:hover img {
            transform: scale(1.15);
        }

        .equipo::after {
            content: attr(data-nombre);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgb(0, 0, 0);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            opacity: 0;
            transition: 0.3s;
            white-space: nowrap;
        }

        .equipo:hover::after {
            opacity: 1;
            bottom: 10px;
        }

        .titulo-bloque {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 50px;
            margin-bottom: 1px;
        }

        .titulo-bloque h2 {
            font-size: 36px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000;
        }

        .logo-nba {
            width: 80px;
            height: auto;
            transition: transform 0.3s;
        }

        .titulo-bloque:hover .logo-nba {
            transform: scale(2) rotate(-20deg);
        }
    </style>
</head>
